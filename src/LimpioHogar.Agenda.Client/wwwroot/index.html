<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LimpioHogar Agenda" />
    <meta name="theme-color" content="#1a3a4a" />
    <title>LimpioHogar Agenda</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="LimpioHogar.Agenda.Client.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#1a3a4a;">
            <div style="text-align:center;color:white;">
                <h2 style="font-family:Inter,sans-serif;font-weight:600;">LimpioHogar</h2>
                <p style="font-family:Inter,sans-serif;opacity:0.7;">Cargando...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ha ocurrido un error.
        <a href="." class="reload">Recargar</a>
        <span class="dismiss">X</span>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        window.authStorage = {
            get: () => localStorage.getItem('supabase_session'),
            set: (json) => localStorage.setItem('supabase_session', json),
            remove: () => localStorage.removeItem('supabase_session')
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
</body>

</html>
